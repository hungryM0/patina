name: "Feature Request / 功能建议"
description: "Suggest an improvement that fits the project scope / 提出符合项目范围的改进建议"
title: "[Feature]: "
body:
  - type: markdown
    attributes:
      value: |
        Thank you for sharing an idea.

        感谢你提出建议。

        Time Tracker is intentionally focused on personal, local-first Windows desktop time tracking. Please explain the user problem before proposing implementation details.

        Time Tracker 有意聚焦个人、本地优先的 Windows 桌面时间追踪。请先说明用户问题，再提出实现方案。

  - type: checkboxes
    id: preflight
    attributes:
      label: "Preflight Checks / 提交前检查"
      options:
        - label: "I searched existing issues and did not find the same request. / 我已经搜索过已有 issue，没有发现相同建议。"
          required: true
        - label: "This request is related to personal, local-first desktop time tracking. / 这个建议与个人、本地优先的桌面时间追踪有关。"
          required: true

  - type: dropdown
    id: primary-value
    attributes:
      label: "Primary Value / 主要价值"
      description: "Choose the main value this request would improve. / 请选择这个建议主要提升的价值。"
      options:
        - "Tracking trustworthiness / 追踪可信度"
        - "Local data safety or control / 本地数据安全或控制力"
        - "Core workflow clarity or efficiency / 核心流程清晰度或效率"
        - "Long-term maintainability / 长期可维护性"
        - "Other / 其他"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: "Problem To Solve / 需要解决的问题"
      description: "Describe the current limitation or workflow problem. / 请描述当前限制或工作流问题。"
      placeholder: "What is difficult today, and who is affected? / 现在有什么困难，会影响谁？"
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: "Proposed Improvement / 建议改进"
      description: "Describe the behavior you would like to see. / 请描述你希望看到的行为。"
      placeholder: "Describe the desired outcome before implementation detail. / 请优先描述期望结果，而不是实现细节。"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives Considered / 已考虑的替代方案"
      description: "Describe any existing workaround or simpler alternative. / 请说明现有绕行方式或更简单的替代方案。"
      placeholder: "Optional, but helpful. / 可选，但会很有帮助。"

  - type: textarea
    id: scope
    attributes:
      label: "Scope Notes / 范围说明"
      description: "Mention important boundaries or non-goals. / 请说明重要边界或非目标。"
      placeholder: "What should this request intentionally avoid expanding into? / 这个建议应明确避免扩张成什么？"

  - type: textarea
    id: data-security
    attributes:
      label: "Data, Privacy, Or Security Considerations / 数据、隐私或安全考虑"
      description: "Required for local APIs, network access, title capture, backup, restore, cleanup, or storage changes. Write `N/A` otherwise. / 如果涉及本机接口、网络访问、标题记录、备份、恢复、清理或存储改动，请填写；否则写 `N/A`。"
      placeholder: "N/A"
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: "Additional Context / 补充信息"
      description: "Add mockups, examples, or related references if useful. / 如有帮助，可以添加草图、示例或相关参考。"
